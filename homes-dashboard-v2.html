<style>
:root{--bg:#141414;--bg2:#1c1c1c;--bg3:#242424;--bg4:#2c2c2c;--border:#333;--border2:#444;--text:#e8e8e8;--text2:#aaa;--text3:#666;--green:#3ecf84;--gbg:#0d2218;--gbr:#143020;--amber:#d4a050;--abg:#1e1608;--abr:#3a2a08;--red:#d06060;--rbg:#200e0e;--rbr:#3a1414;--blue:#5aaaf0;--bbg:#081828;--bbr:#102040;--r:8px;--rl:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-icon{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr h1{font-size:16px;font-weight:500}
.hdr span{font-size:11px;color:var(--text3);margin-left:auto;font-family:'DM Mono',monospace}
.hdr .updated{font-size:10px;color:var(--text3);background:var(--bg3);padding:3px 8px;border-radius:4px;border:1px solid var(--border)}
.main{padding:1.25rem 1.5rem;max-width:1400px;margin:0 auto}
.sec{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:1rem 1.1rem;margin-bottom:1rem}
.st{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:.7rem}
.cmp-row{display:grid;grid-template-columns:1fr 36px 1fr;gap:10px;align-items:center;margin-bottom:1rem}
.vs{text-align:center;font-size:11px;color:var(--text3);font-weight:500}
select{width:100%;padding:7px 9px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
select:focus{outline:none;border-color:#555}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:.9rem 1rem}
.cn{font-size:14px;font-weight:500;margin-bottom:0}
.cs{font-size:9px;color:var(--text3);margin-bottom:8px}
.drow{display:flex;justify-content:space-between;align-items:flex-start;font-size:10.5px;padding:3.5px 0;border-bottom:1px solid #222}
.drow:last-of-type{border-bottom:none}
.dl{color:var(--text3);flex-shrink:0;margin-right:4px;white-space:nowrap}
.dv{font-weight:500;color:var(--text2);text-align:right;font-size:10.5px;line-height:1.3;max-width:63%}
.win{color:var(--green)!important}
.sub{margin-top:8px;padding-top:6px;border-top:1px solid #222}
.slbl{font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px}
.pill-row{display:flex;flex-wrap:wrap;gap:3px;margin:3px 0 5px}
.pill{font-size:9px;padding:2px 6px;border-radius:4px;white-space:nowrap}
.pg{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
.pa{background:var(--abg);color:var(--amber);border:1px solid var(--abr)}
.pb{background:var(--bbg);color:var(--blue);border:1px solid var(--bbr)}
.pr2{background:var(--rbg);color:var(--red);border:1px solid var(--rbr)}
a.link-pill{font-size:9px;padding:2px 8px;border-radius:4px;text-decoration:none;display:inline-block;margin:2px 2px 0 0}
a.link-rent{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
a.link-cc{background:var(--bbg);color:var(--blue);border:1px solid var(--bbr)}
.pc{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:7px}
.pro{background:var(--gbg);border:1px solid var(--gbr);border-radius:6px;padding:5px 7px;font-size:9.5px;color:#68c990;line-height:1.45}
.con{background:var(--rbg);border:1px solid var(--rbr);border-radius:6px;padding:5px 7px;font-size:9.5px;color:#cd7575;line-height:1.45}
.pro b,.con b{font-weight:600;display:block;margin-bottom:1px;font-size:9px;text-transform:uppercase;letter-spacing:.04em}
.voices{margin-top:7px;display:flex;flex-direction:column;gap:4px}
.voice{background:#161616;border-radius:5px;padding:5px 8px;border-left:2px solid var(--border2)}
.vt{font-size:10px;color:#888;line-height:1.5;font-style:italic}
.vm{font-size:8.5px;color:#444;margin-top:2px}
.vsp{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;margin-right:3px;font-style:normal;font-weight:600}
.vpos{background:var(--gbg);color:var(--green)}.vneg{background:var(--rbg);color:var(--red)}.vmix{background:var(--abg);color:var(--amber)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:.8rem}
.fi{display:flex;flex-direction:column;gap:3px}
.fl{font-size:10px;color:var(--text3)}
.fi select{font-size:11.5px;padding:5px 8px}
.rbtn{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;color:var(--text3)}
.rbtn:hover{background:var(--bg3);color:var(--text2)}
.rcount{font-size:10px;color:var(--text3);margin:.7rem 0 .4rem}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:8px}
.rcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:.75rem .85rem;cursor:pointer;transition:border-color .15s}
.rcard:hover{border-color:#555}
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.rn{font-size:12.5px;font-weight:500}.rco{font-size:8.5px;color:var(--text3);margin-top:1px}
.badge{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:500;white-space:nowrap}
.ba{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
.bb{background:var(--bbg);color:var(--blue);border:1px solid var(--bbr)}
.bc{background:var(--abg);color:var(--amber);border:1px solid var(--abr)}
.rrow{display:flex;justify-content:space-between;font-size:10.5px;margin-bottom:2px}
.rl2{color:var(--text3)}.rv{font-weight:500;color:var(--text2)}
.cbar{height:3px;border-radius:2px;background:#2a2a2a;margin:3px 0;overflow:hidden}
.cfill{height:100%}
.rnote{font-size:9px;color:var(--text3);font-style:italic;margin-top:3px}
.rclick{font-size:8.5px;color:#3a3a3a;margin-top:3px;text-align:right}
.nores{color:var(--text3);font-size:12px;padding:1.5rem 0;text-align:center}
.park-row{display:flex;align-items:flex-start;gap:5px;font-size:9.5px;color:#999;margin-bottom:2px}
.pd{color:var(--green);font-size:8px;flex-shrink:0;margin-top:3px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-icon">🏠</div>
  <h1>Homes — Suburb Comparison Dashboard</h1>
  <span class="updated">Updated May 2026 &middot; NJ &middot; NY &middot; CT &middot; up to 90 min from Manhattan</span>
</div>
<div class="main">

<div class="sec">
  <div class="st">Section 1 — Compare any two towns</div>
  <div class="cmp-row">
    <select id="selA" onchange="renderCmp()"></select>
    <div class="vs">vs</div>
    <select id="selB" onchange="renderCmp()"></select>
  </div>
  <div class="cgrid" id="cmpOut"></div>
</div>

<div class="sec">
  <div class="st">Section 2 — Filter towns by any combination of characteristics</div>
  <div class="fgrid">
    <div class="fi"><label class="fl">State</label>
      <select id="f_st" onchange="doFilter()"><option value="">Any state</option><option>NJ</option><option>NY</option><option>CT</option></select></div>
    <div class="fi"><label class="fl">Commute time</label>
      <select id="f_cm" onchange="doFilter()"><option value="">Any (up to 90 min)</option><option value="0-29">Under 30 min</option><option value="30-44">30–44 min</option><option value="45-59">45–59 min</option><option value="60-74">60–74 min</option><option value="75-90">75–90 min</option></select></div>
    <div class="fi"><label class="fl">School rating</label>
      <select id="f_sc" onchange="doFilter()"><option value="">Any rating</option><option value="A+">A+ exceptional</option><option value="A">A excellent</option><option value="A-">A− very good</option><option value="B+">B+ above avg</option><option value="B">B above avg</option></select></div>
    <div class="fi"><label class="fl">Home price</label>
      <select id="f_pr" onchange="doFilter()"><option value="">Any price</option><option value="0-500">Under $500K</option><option value="500-700">$500K–$700K</option><option value="700-900">$700K–$900K</option><option value="900-1200">$900K–$1.2M</option><option value="1200-1500">$1.2M–$1.5M</option><option value="1500+">$1.5M+</option></select></div>
    <div class="fi"><label class="fl">Property tax/yr</label>
      <select id="f_tx" onchange="doFilter()"><option value="">Any</option><option value="0-12000">Under $12K</option><option value="12000-18000">$12K–$18K</option><option value="18000-22000">$18K–$22K</option><option value="22000+">$22K+</option></select></div>
    <div class="fi"><label class="fl">Avg monthly rent</label>
      <select id="f_ar" onchange="doFilter()"><option value="">Any</option><option value="0-2500">Under $2,500</option><option value="2500-3500">$2,500–$3,500</option><option value="3500-5500">$3,500–$5,500</option></select></div>
    <div class="fi"><label class="fl">Rental market size</label>
      <select id="f_rs" onchange="doFilter()"><option value="">Any</option><option value="large">Large (500+ units)</option><option value="mid">Mid-size (100–499)</option><option value="small">Small (under 100)</option></select></div>
    <div class="fi"><label class="fl">Terminal</label>
      <select id="f_term" onchange="doFilter()"><option value="">Any</option><option>Grand Central</option><option>Penn Station</option><option>Port Authority</option></select></div>
    <div class="fi"><label class="fl">Transit type</label>
      <select id="f_tr" onchange="doFilter()"><option value="">Any</option><option value="direct">Direct train</option><option value="metro_north">Metro-North</option><option value="nj_transit">NJ Transit rail</option><option value="bus">Bus to Port Authority</option><option value="ferry">Ferry option</option></select></div>
    <div class="fi"><label class="fl">Kid friendliness</label>
      <select id="f_kd" onchange="doFilter()"><option value="">Any</option><option value="5">Exceptional (5/5)</option><option value="4">Very kid-friendly (4+)</option><option value="3">Good for families (3+)</option></select></div>
    <div class="fi"><label class="fl">Childcare / aftercare</label>
      <select id="f_cc" onchange="doFilter()"><option value="">Any</option><option value="school_aftercare">School-based aftercare</option><option value="ymca">YMCA program</option><option value="private_centers">Private daycare centers</option><option value="nanny_share">Nanny share culture</option><option value="kindercare">KinderCare / chain</option></select></div>
    <div class="fi"><label class="fl">Parks &amp; outdoors</label>
      <select id="f_pk" onchange="doFilter()"><option value="">Any</option><option value="waterfront_park">Waterfront / beach</option><option value="hiking">Hiking trails</option><option value="splash_pad">Splash pads / pools</option><option value="nature_center">Nature centers</option><option value="dog_friendly">Dog-friendly parks</option></select></div>
    <div class="fi"><label class="fl">Youth sports</label>
      <select id="f_sp" onchange="doFilter()"><option value="">Any</option><option value="soccer">Soccer</option><option value="lacrosse">Lacrosse</option><option value="hockey">Ice hockey</option><option value="baseball">Baseball/softball</option><option value="basketball">Basketball</option><option value="swim">Swim teams</option><option value="tennis">Tennis</option><option value="sailing">Sailing/water sports</option></select></div>
    <div class="fi"><label class="fl">Vibe / lifestyle</label>
      <select id="f_vb" onchange="doFilter()"><option value="">Any vibe</option><option value="arts">Arts &amp; culture</option><option value="waterfront">Waterfront/coastal</option><option value="walkable">Highly walkable</option><option value="quiet">Quiet/suburban</option><option value="affordable">Best value</option><option value="upscale">Upscale/affluent</option><option value="family">Family-oriented</option><option value="diverse">Diverse community</option><option value="outdoor">Outdoor lifestyle</option><option value="nyc_feel">Closest NYC feel</option></select></div>
    <div class="fi"><label class="fl">People say best for</label>
      <select id="f_rc" onchange="doFilter()"><option value="">Any</option><option value="young_prof">Young professionals</option><option value="families">Families with kids</option><option value="hybrid">Hybrid workers</option><option value="schools_first">Schools are #1</option><option value="creatives">Creatives/artists</option><option value="outdoor">Outdoor enthusiasts</option><option value="budget">Budget-conscious</option></select></div>
    <div class="fi"><label class="fl">Community feel</label>
      <select id="f_com" onchange="doFilter()"><option value="">Any</option><option value="welcoming">Welcoming to newcomers</option><option value="tight_knit">Tight-knit/established cliques</option><option value="diverse_feel">Genuinely diverse</option><option value="affluent_feel">Wealthy/affluent feel</option><option value="progressive">Progressive/liberal</option></select></div>
  </div>
  <button class="rbtn" onclick="resetF()">Reset all filters</button>
  <div id="filterOut"></div>
</div>

</div>

var SR={'A+':1,'A':2,'A-':3,'A\u2212':3,'B+':4,'B':5};
function cc(m){return m<=45?'#3ecf84':m<=70?'#d4a050':'#d06060';}
function bclass(s){return s==='A+'?'ba':s.startsWith('A')?'bb':'bc';}
function sc(s){return s==='pos'?'vpos':s==='neg'?'vneg':'vmix';}
function sl(s){return s==='pos'?'positive':s==='neg'?'critical':'mixed';}
function stars(n){var s='';for(var i=0;i<5;i++)s+='<span style="color:'+(i<n?'#f0c040':'#333')+'">&#9733;</span>';return s;}

var ccLabels={school_aftercare:'School aftercare',ymca:'YMCA',private_centers:'Private centers',nanny_share:'Nanny share',kindercare:'KinderCare'};

function buildDrops(){
  var s=[].concat(T).sort(function(a,b){return a.n.localeCompare(b.n);});
  var h=s.map(function(t){return '<option value="'+T.indexOf(t)+'">'+t.n+', '+t.st+' ('+t.cm+' min)</option>';}).join('');
  ['selA','selB'].forEach(function(id){document.getElementById(id).innerHTML=h;});
  document.getElementById('selA').value=T.findIndex(function(t){return t.n==='Maplewood';});
  document.getElementById('selB').value=T.findIndex(function(t){return t.n==='Montclair';});
}

function cardHTML(t,o){
  var cmW=t.cm<o.cm,prW=t.pm<o.pm,scW=(SR[t.sc]||9)<(SR[o.sc]||9),txW=t.tx<o.tx;
  var rsL=t.rs==='large'?'Large (~'+t.ren+'+ units)':t.rs==='mid'?'Mid-size (~'+t.ren+' units)':'Small (~'+t.ren+' units)';
  var vH=t.voices.map(function(v){return '<div class="voice"><div class="vt"><span class="vsp '+sc(v.sent)+'">'+sl(v.sent)+'</span>'+v.t+'</div><div class="vm">&mdash; '+v.s+'</div></div>';}).join('');
  var spH=t.sports.map(function(s){return '<span class="pill pb">'+s+'</span>';}).join('');
  var pkH=t.kperks.map(function(p){return '<span class="pill pg">'+p+'</span>';}).join('');
  var kcH=t.kcons.map(function(p){return '<span class="pill pa">'+p+'</span>';}).join('');
  var prH=t.parks.map(function(p){return '<div class="park-row"><span class="pd">&#9679;</span><span>'+p+'</span></div>';}).join('');
  var ccpH=t.cc.map(function(c){return '<span class="pill pb">'+(ccLabels[c]||c)+'</span>';}).join('');
  var ccLinkH=t.ccLinks.map(function(l){return '<a href="'+l.u+'" target="_blank" rel="noopener" class="link-pill link-cc">'+l.l+'&nbsp;&#8599;</a>';}).join('');
  return '<div class="card">'
    +'<div class="cn">'+t.n+'</div><div class="cs">'+t.co+' &middot; '+t.st+'</div>'
    +'<div class="drow"><span class="dl">Terminal</span><span class="dv">'+t.term+'</span></div>'
    +'<div class="drow"><span class="dl">Commute</span><span class="dv'+(cmW?' win':'')+'">'+t.cm+' min'+(cmW?' &#10003;':'')+'</span></div>'
    +'<div class="drow"><span class="dl">Transit</span><span class="dv">'+t.tr+'</span></div>'
    +'<div class="drow"><span class="dl">Home price</span><span class="dv'+(prW?' win':'')+'">'+t.pr+(prW?' &#10003;':'')+'</span></div>'
    +'<div class="drow"><span class="dl">Schools</span><span class="dv'+(scW?' win':'')+'">'+t.sc+(scW?' &#10003;':'')+' &mdash; '+t.sn+'</span></div>'
    +'<div class="drow"><span class="dl">Vibe</span><span class="dv">'+t.vb+'</span></div>'
    +'<div class="sub"><div class="slbl" style="color:#d4a050">Avg property costs</div>'
    +'<div class="drow"><span class="dl">Property tax/yr</span><span class="dv'+(txW?' win':'')+'">$'+t.tx.toLocaleString()+(txW?' &#10003;':'')+'</span></div>'
    +'<div class="drow"><span class="dl">Electricity est.</span><span class="dv">'+t.elec+'</span></div>'
    +'<div class="drow"><span class="dl">HOA / condo fees</span><span class="dv">'+t.hoa+'</span></div>'
    +'<div class="drow"><span class="dl">Rental market</span><span class="dv">'+rsL+'</span></div>'
    +'<div class="drow" style="border:none"><span class="dl">Avg monthly rent</span><span class="dv">$'+t.ar.toLocaleString()+'/mo</span></div>'
    +'<div style="margin-top:5px"><a href="'+t.rentUrl+'" target="_blank" rel="noopener" class="link-pill link-rent">Search house/townhome rentals &le;$5,500 &rarr;</a></div>'
    +'</div>'
    +'<div class="sub"><div class="slbl" style="color:#3ecf84">Kid &amp; family life &mdash; '+stars(t.ks)+' '+t.kl+'</div>'
    +prH
    +'<div style="margin-top:4px" class="pill-row">'+pkH+'</div>'
    +'<div class="pill-row">'+kcH+'</div>'
    +'<div class="slbl" style="margin-top:4px">Youth sports</div>'
    +'<div class="pill-row">'+spH+'</div>'
    +'</div>'
    +'<div class="sub"><div class="slbl" style="color:#5aaaf0">Childcare &amp; aftercare (Kindergarten)</div>'
    +'<div class="pill-row">'+ccpH+'</div>'
    +'<div style="font-size:9.5px;color:#888;line-height:1.5;margin-top:4px">'+t.ccNote+'</div>'
    +'<div style="margin-top:5px">'+ccLinkH+'</div>'
    +'</div>'
    +'<div class="pc"><div class="pro"><b>Pros</b>'+t.pro+'</div><div class="con"><b>Cons</b>'+t.con+'</div></div>'
    +'<div class="voices">'+vH+'</div>'
    +'</div>';
}

function renderCmp(){
  var t1=T[+document.getElementById('selA').value];
  var t2=T[+document.getElementById('selB').value];
  if(!t1||!t2)return;
  document.getElementById('cmpOut').innerHTML=cardHTML(t1,t2)+cardHTML(t2,t1);
}

function matchBand(val,band){
  if(!band)return true;
  if(band.endsWith('+'))return val>=parseInt(band);
  var p=band.split('-').map(Number);
  return val>=p[0]&&val<=p[1];
}

function doFilter(){
  var fs=document.getElementById('f_st').value;
  var fc=document.getElementById('f_cm').value;
  var fsc=document.getElementById('f_sc').value;
  var fp=document.getElementById('f_pr').value;
  var ftx=document.getElementById('f_tx').value;
  var far=document.getElementById('f_ar').value;
  var frs=document.getElementById('f_rs').value;
  var ft=document.getElementById('f_term').value;
  var ftr=document.getElementById('f_tr').value;
  var fk=document.getElementById('f_kd').value;
  var fcc=document.getElementById('f_cc').value;
  var fpk=document.getElementById('f_pk').value;
  var fsp=document.getElementById('f_sp').value;
  var fvb=document.getElementById('f_vb').value;
  var frc=document.getElementById('f_rc').value;
  var fco=document.getElementById('f_com').value;

  var res=T.filter(function(t){
    if(fs&&t.st!==fs)return false;
    if(fc&&!matchBand(t.cm,fc))return false;
    if(fsc){var nm=fsc.replace('-','\u2212');if(t.sc!==nm&&t.sc!==fsc)return false;}
    if(fp&&!matchBand(t.pm,fp))return false;
    if(ftx&&!matchBand(t.tx,ftx))return false;
    if(far&&!matchBand(t.ar,far))return false;
    if(frs&&t.rs!==frs)return false;
    if(ft&&t.term!==ft)return false;
    if(ftr&&t.tt.indexOf(ftr)<0)return false;
    if(fk&&t.ks<parseInt(fk))return false;
    if(fcc&&t.cc.indexOf(fcc)<0)return false;
    if(fpk&&t.ptags.indexOf(fpk)<0)return false;
    if(fsp&&t.sports.indexOf(fsp)<0)return false;
    if(fvb&&t.vt.indexOf(fvb)<0)return false;
    if(frc&&t.rt.indexOf(frc)<0)return false;
    if(fco&&t.ct.indexOf(fco)<0)return false;
    return true;
  });

  var el=document.getElementById('filterOut');
  if(!res.length){el.innerHTML='<p class="nores">No towns match &mdash; try loosening a filter.</p>';return;}
  res.sort(function(a,b){return a.cm-b.cm;});

  var cards=res.map(function(t){
    var idx=T.indexOf(t);
    var pct=Math.min(100,Math.round((t.cm/95)*100));
    var rsL=t.rs==='large'?'Large market':t.rs==='mid'?'Mid-size market':'Small/limited';
    var topSp=t.sports.slice(0,4).join(', ')+(t.sports.length>4?' +more':'');
    var ccpH=t.cc.map(function(c){return '<span class="pill pb" style="font-size:8px">'+(ccLabels[c]||c)+'</span>';}).join('');
    return '<div class="rcard" onclick="loadCmp('+idx+')">'
      +'<div class="rh"><div><div class="rn">'+t.n+'</div><div class="rco">'+t.co+' &middot; '+t.st+' &middot; '+t.term+'</div></div><span class="badge '+bclass(t.sc)+'">'+t.sc+' schools</span></div>'
      +'<div class="rrow"><span class="rl2">Commute</span><span class="rv" style="color:'+cc(t.cm)+'">'+t.cm+' min</span></div>'
      +'<div class="cbar"><div class="cfill" style="width:'+pct+'%;background:'+cc(t.cm)+'"></div></div>'
      +'<div class="rrow"><span class="rl2">Home price</span><span class="rv">'+t.pr+'</span></div>'
      +'<div class="rrow"><span class="rl2">Property tax/yr</span><span class="rv">$'+t.tx.toLocaleString()+'</span></div>'
      +'<div class="rrow"><span class="rl2">Avg rent</span><span class="rv" style="color:#3ecf84">$'+t.ar.toLocaleString()+'/mo</span></div>'
      +'<div class="rrow"><span class="rl2">Rental market</span><span class="rv">'+rsL+'</span></div>'
      +'<div class="rrow"><span class="rl2">Kid score</span><span class="rv">'+stars(t.ks)+' '+t.kl+'</span></div>'
      +'<div class="rrow"><span class="rl2">Sports</span><span class="rv" style="font-size:9.5px;color:#5aaaf0">'+topSp+'</span></div>'
      +'<div style="margin-top:3px">'+ccpH+'</div>'
      +'<div class="rnote">'+t.vb+'</div>'
      +'<a href="'+t.rentUrl+'" target="_blank" rel="noopener" style="display:block;margin-top:4px;font-size:9px;color:#3ecf84;text-decoration:none">Search rentals &le;$5,500 &#8599;</a>'
      +'<div class="rclick">Click to compare &nearr;</div>'
      +'</div>';
  }).join('');

  el.innerHTML='<div class="rcount">'+res.length+' town'+(res.length!==1?'s':'')+' match &mdash; click any card to load it into the comparison above</div><div class="rgrid">'+cards+'</div>';
}

var slot=1;
function loadCmp(idx){
  document.getElementById(slot===1?'selA':'selB').value=idx;
  slot=slot===1?2:1;
  renderCmp();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetF(){
  ['f_st','f_cm','f_sc','f_pr','f_tx','f_ar','f_rs','f_term','f_tr','f_kd','f_cc','f_pk','f_sp','f_vb','f_rc','f_com'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('filterOut').innerHTML='';
}

buildDrops();
renderCmp();
</script>
